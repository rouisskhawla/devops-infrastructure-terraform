name: Terraform Workflow - Prod

on:
  push:
    branches: [main]
    paths:
      - 'environments/prod/**'
      - 'modules/**'

jobs:
  plan:
    runs-on: [self-hosted, terraform]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube/prod
          echo "${{ secrets.PROD_ADMIN_KUBECONFIG }}" > ~/.kube/prod/config
          chmod 600 ~/.kube/prod/config

      - name: Terraform Format Check
        working-directory: environments/prod
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: environments/prod
        run: terraform validate

      - name: Terraform Init
        working-directory: environments/prod
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/prod
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
          TF_VAR_cluster_api_server: ${{ secrets.PROD_CLUSTER_API_SERVER }}
          TF_VAR_cluster_ca_cert: ${{ secrets.PROD_CLUSTER_CA_CERT }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_PAT }}
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/prod/tfplan

  apply:
    runs-on: [self-hosted, terraform]
    needs: plan

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube/prod
          echo "${{ secrets.PROD_ADMIN_KUBECONFIG }}" > ~/.kube/prod/config
          chmod 600 ~/.kube/prod/config

      - name: Terraform Init
        working-directory: environments/prod
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environments/prod

      - name: Terraform Apply
        working-directory: environments/prod
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
          TF_VAR_cluster_api_server: ${{ secrets.PROD_CLUSTER_API_SERVER }}
          TF_VAR_cluster_ca_cert: ${{ secrets.PROD_CLUSTER_CA_CERT }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_PAT }}
        run: terraform apply tfplan