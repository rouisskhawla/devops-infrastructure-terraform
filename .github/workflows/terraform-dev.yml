name: Terraform Apply - Dev

on:
  push:
    branches: [main]
    paths:
      - 'environments/dev/**'
      - 'modules/**'

jobs:
  terraform:
    runs-on: [self-hosted, terraform]
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube/dev
          echo "${{ secrets.DEV_ADMIN_KUBECONFIG }}" > ~/.kube/dev/config

      - name: Terraform Apply
        working-directory: environments/dev
        env:
          TF_VAR_cluster_api_server: ${{ secrets.DEV_CLUSTER_API_SERVER }}
          TF_VAR_cluster_ca_cert: ${{ secrets.DEV_CLUSTER_CA_CERT }}
        run: terraform apply -auto-approve