name: Terraform Workflow - Dev

on:
  push:
    branches: [main]
    paths:
      - 'environments/dev/**'
      - 'modules/**'

jobs:
  validate:
    uses: rouisskhawla/github-shared-workflow/.github/workflows/terraform-validate.yml@main

  plan:
    runs-on: [self-hosted, terraform]
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube/dev
          echo "${{ secrets.DEV_ADMIN_KUBECONFIG }}" > ~/.kube/dev/config
          chmod 600 ~/.kube/dev/config

      - name: Terraform Init
        working-directory: environments/dev
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/dev
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
          TF_VAR_cluster_api_server: ${{ secrets.DEV_CLUSTER_API_SERVER }}
          TF_VAR_cluster_ca_cert: ${{ secrets.DEV_CLUSTER_CA_CERT }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_PAT }}
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/dev/tfplan

  apply:
    runs-on: [self-hosted, terraform]
    needs: plan

    environment:
      name: development

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube/dev
          echo "${{ secrets.DEV_ADMIN_KUBECONFIG }}" > ~/.kube/dev/config
          chmod 600 ~/.kube/dev/config

      - name: Terraform Init
        working-directory: environments/dev
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environments/dev

      - name: Terraform Apply
        working-directory: environments/dev
        env:
          CONSUL_HTTP_TOKEN: ${{ secrets.CONSUL_HTTP_TOKEN }}
          TF_VAR_cluster_api_server: ${{ secrets.DEV_CLUSTER_API_SERVER }}
          TF_VAR_cluster_ca_cert: ${{ secrets.DEV_CLUSTER_CA_CERT }}
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_PAT }}
        run: terraform apply tfplan